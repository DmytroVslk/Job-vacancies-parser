<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Aggregator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Job Aggregator</h1>
            <p>Find developer jobs by language and title</p>
        </header>

        <!-- Filters Panel  -->
        <div class="filters">
            <div class="filter-group">
                <label for="location">Location:</label>
                <select id="location">
                    <option value="Dallas, TX">Dallas, TX</option>
                    <option value="Austin, TX">Austin, TX</option>
                    <option value="San Francisco, CA">San Francisco, CA</option>
                    <option value="New York, NY">New York, NY</option>
                    <option value="Remote">Remote</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="position">Position:</label>
                <select id="position">
                    <option value="">All IT / Tech Roles</option>
                    <option value="junior java developer">Junior Java Developer</option>
                    <option value="senior java developer">Senior Java Developer</option>
                    <option value="python developer">Python Developer</option>
                    <option value="javascript developer">JavaScript Developer</option>
                    <option value="frontend developer">Frontend Developer</option>
                    <option value="backend developer">Backend Developer</option>
                    <option value="full stack developer">Full Stack Developer</option>
                    <option value="devops engineer">DevOps Engineer</option>
                    <option value="data engineer">Data Engineer</option>
                </select>
            </div>

            <button id="searchBtn" onclick="searchJobs()">Search Jobs</button>
        </div>

        <!-- Status -->
        <div id="status" class="status">Ready to search. Select filters and click Search.</div>

        <!-- Results Table -->
        <div class="results">
            <h2>Results: <span id="jobCount">0</span> jobs</h2>
            <table id="jobsTable">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Company</th>
                        <th>Location</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="jobsTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
