<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Aggregator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Job Aggregator</h1>
            <p>Find developer jobs by language and title</p>
        </header>

        <!-- Filters Panel  -->
        <form id="searchForm" class="filters" novalidate>
            <div class="filter-group">
                <label for="location">Location:</label>
                <input
                    id="location"
                    name="location"
                    type="text"
                    list="locationSuggestions"
                    placeholder="Dallas, TX"
                    autocomplete="address-level2"
                    required
                >
                <datalist id="locationSuggestions">
                    <option value="Dallas, TX"></option>
                    <option value="Austin, TX"></option>
                    <option value="San Francisco, CA"></option>
                    <option value="New York, NY"></option>
                    <option value="Remote"></option>
                </datalist>
                <span id="locationError" class="field-error" aria-live="polite"></span>
            </div>

            <div class="filter-group">
                <label for="position">Position:</label>
                <select id="position" name="position">
                    <option value="">All IT / Tech Roles</option>
                    <option value="junior java developer">Junior Java Developer</option>
                    <option value="senior java developer">Senior Java Developer</option>
                    <option value="python developer">Python Developer</option>
                    <option value="javascript developer">JavaScript Developer</option>
                    <option value="frontend developer">Frontend Developer</option>
                    <option value="backend developer">Backend Developer</option>
                    <option value="full stack developer">Full Stack Developer</option>
                    <option value="devops engineer">DevOps Engineer</option>
                    <option value="data engineer">Data Engineer</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="sort">Sort by:</label>
                <select id="sort" name="sort">
                    <option value="relevance">Relevance</option>
                    <option value="newest">Newest</option>
                    <option value="salary">Salary</option>
                    <option value="company">Company</option>
                </select>
            </div>

            <button id="searchBtn" type="submit">Search Jobs</button>
        </form>

        <!-- Status -->
        <div id="status" class="status">Ready to search. Select filters and click Search.</div>

        <!-- Results -->
        <div class="results">
            <h2>Results: <span id="jobCount">0</span> jobs</h2>
            <div id="jobsList" class="jobs-list"></div>
            <p id="visibleJobsSummary" class="visible-jobs-summary" hidden></p>
            <button id="loadMoreBtn" class="load-more-btn" type="button" hidden>Load More</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
